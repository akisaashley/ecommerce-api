<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Commerce Store | Akisa Ashley Maria</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            color-scheme: light;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }

        .glass {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 1rem;
        }

        .product-card {
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.02);
        }

        .status-badge {
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .status-active { background: #10b981; color: white; }
        .status-pending { background: #f59e0b; color: white; }
        .status-confirmed { background: #3b82f6; color: white; }
        .status-shipped { background: #8b5cf6; color: white; }
        .status-delivered { background: #10b981; color: white; }
        .status-cancelled { background: #ef4444; color: white; }

        .loading-spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .modal-backdrop {
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
        }

        .tab-active {
            background: #667eea;
            color: white;
        }

        .tab-inactive {
            background: white;
            color: #4a5568;
        }

        .tab-inactive:hover {
            background: #edf2f7;
        }
    </style>
</head>
<body class="font-sans antialiased">

    <!-- Navigation -->
    <nav class="bg-white shadow-lg sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center">
                    <h1 class="text-xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-purple-600 to-blue-600">
                        🛍️ E-Commerce Store
                    </h1>
                    <div class="ml-10 hidden md:flex space-x-4">
                        <button onclick="showTab('products')" id="tab-products-btn" class="px-3 py-2 rounded-md text-sm font-medium tab-active transition">Products</button>
                        <button onclick="showTab('orders')" id="tab-orders-btn" class="px-3 py-2 rounded-md text-sm font-medium tab-inactive transition">My Orders</button>
                        <button onclick="showTab('create-order')" id="tab-create-order-btn" class="px-3 py-2 rounded-md text-sm font-medium tab-inactive transition">Create Order</button>
                    </div>
                </div>
                <div class="text-right">
                    <p class="text-xs text-gray-500">Akisa Ashley Maria</p>
                    <p class="text-xs text-gray-400">Student #2300705729</p>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">

        <!-- Products Tab -->
        <div id="products-tab" class="tab-content">
            <div class="bg-white rounded-lg shadow-lg p-6 mb-6">
                <div class="flex flex-wrap gap-4 items-center justify-between">
                    <h2 class="text-2xl font-bold text-gray-800">📦 Our Products</h2>
                    <div class="flex gap-3">
                        <input type="number" id="min-stock-filter" placeholder="Min Stock" class="px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500">
                        <input type="text" id="search-product" placeholder="Search by name or SKU" class="px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500">
                        <button onclick="loadProducts()" class="bg-purple-600 text-white px-4 py-2 rounded-lg hover:bg-purple-700 transition">Apply Filter</button>
                        <button onclick="resetFilters()" class="bg-gray-500 text-white px-4 py-2 rounded-lg hover:bg-gray-600 transition">Reset</button>
                    </div>
                </div>
            </div>
            <div id="products-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                <div class="col-span-full flex justify-center py-12">
                    <div class="loading-spinner"></div>
                </div>
            </div>
            <div id="pagination" class="flex justify-center gap-2 mt-8"></div>
        </div>

        <!-- Orders Tab -->
        <div id="orders-tab" class="tab-content hidden">
            <div class="bg-white rounded-lg shadow-lg p-6 mb-6">
                <h2 class="text-2xl font-bold text-gray-800">📋 My Orders</h2>
                <p class="text-gray-600 mt-1">View and track your order history</p>
            </div>
            <div id="orders-container" class="space-y-4">
                <div class="col-span-full flex justify-center py-12">
                    <div class="loading-spinner"></div>
                </div>
            </div>
        </div>

        <!-- Create Order Tab -->
        <div id="create-order-tab" class="tab-content hidden">
            <div class="bg-white rounded-lg shadow-lg p-6">
                <h2 class="text-2xl font-bold text-gray-800 mb-6">🛒 Create New Order</h2>
                
                <div class="mb-6">
                    <label class="block text-sm font-medium text-gray-700 mb-2">Select User</label>
                    <select id="user-id" class="w-full md:w-64 px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500">
                        <option value="1">John Doe</option>
                        <option value="2">Jane Smith</option>
                        <option value="3">Bob Johnson</option>
                        <option value="4">Alice Williams</option>
                        <option value="5">Charlie Brown</option>
                    </select>
                </div>

                <div class="mb-6">
                    <h3 class="text-lg font-semibold text-gray-800 mb-3">Order Items</h3>
                    <div id="order-items-list" class="space-y-3 mb-4">
                        <p class="text-gray-500 text-center py-4">No items added yet. Click "Add Product" to start.</p>
                    </div>
                    <button onclick="openProductModal()" class="bg-green-600 text-white px-4 py-2 rounded-lg hover:bg-green-700 transition">
                        + Add Product
                    </button>
                </div>

                <div class="border-t pt-4 mb-6">
                    <p class="text-xl font-bold text-gray-800">Total: $<span id="order-total">0.00</span></p>
                </div>

                <button onclick="submitOrder()" class="bg-purple-600 text-white px-6 py-3 rounded-lg hover:bg-purple-700 transition font-semibold w-full md:w-auto">
                    Place Order
                </button>
            </div>
        </div>
    </div>

    <!-- Product Modal -->
    <div id="product-modal" class="fixed inset-0 z-50 hidden modal-backdrop flex items-center justify-center">
        <div class="bg-white rounded-lg shadow-xl w-full max-w-md mx-4 p-6">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-xl font-bold text-gray-800">Add Product to Order</h3>
                <button onclick="closeProductModal()" class="text-gray-400 hover:text-gray-600 text-2xl">&times;</button>
            </div>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Select Product</label>
                    <select id="modal-product-id" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500"></select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Quantity</label>
                    <input type="number" id="modal-quantity" min="1" value="1" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500">
                </div>
                <div class="flex gap-3 pt-4">
                    <button onclick="addToOrder()" class="flex-1 bg-purple-600 text-white px-4 py-2 rounded-lg hover:bg-purple-700 transition">Add to Order</button>
                    <button onclick="closeProductModal()" class="flex-1 bg-gray-300 text-gray-700 px-4 py-2 rounded-lg hover:bg-gray-400 transition">Cancel</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Order Detail Modal -->
    <div id="order-detail-modal" class="fixed inset-0 z-50 hidden modal-backdrop flex items-center justify-center">
        <div class="bg-white rounded-lg shadow-xl w-full max-w-2xl mx-4 p-6 max-h-[80vh] overflow-y-auto">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-xl font-bold text-gray-800">Order Details</h3>
                <button onclick="closeOrderDetailModal()" class="text-gray-400 hover:text-gray-600 text-2xl">&times;</button>
            </div>
            <div id="order-detail-content"></div>
        </div>
    </div>

    <!-- Toast Container -->
    <div id="toast-container" class="fixed bottom-4 right-4 z-50 space-y-2"></div>

    <script>
        const API_BASE = '';
        let currentPage = 1;
        let currentMinStock = null;
        let currentSearch = null;
        let orderItems = [];
        let productsList = [];

        // Helper Functions
        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            const colors = {
                success: 'bg-green-500',
                error: 'bg-red-500',
                info: 'bg-blue-500'
            };
            toast.className = `${colors[type]} text-white px-4 py-3 rounded-lg shadow-lg mb-2 animate-bounce`;
            toast.innerHTML = message;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function showLoading(show) {
            // Implement loading state if needed
        }

        function formatDate(dateString) {
            if (!dateString) return '-';
            return new Date(dateString).toLocaleString();
        }

        function formatPrice(price) {
            return parseFloat(price).toFixed(2);
        }

        // Tab Management
        function showTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(tab => {
                tab.classList.add('hidden');
            });
            document.getElementById(`${tabName}-tab`).classList.remove('hidden');

            const btns = ['products', 'orders', 'create-order'];
            btns.forEach(btn => {
                const btnElement = document.getElementById(`tab-${btn}-btn`);
                if (btn === tabName) {
                    btnElement.classList.remove('tab-inactive');
                    btnElement.classList.add('tab-active');
                } else {
                    btnElement.classList.remove('tab-active');
                    btnElement.classList.add('tab-inactive');
                }
            });

            if (tabName === 'products') loadProducts();
            if (tabName === 'orders') loadOrders();
            if (tabName === 'create-order') loadProductsForModal();
        }

        // Products Functions
        async function loadProducts() {
            const container = document.getElementById('products-container');
            container.innerHTML = '<div class="col-span-full flex justify-center py-12"><div class="loading-spinner"></div></div>';

            const skip = (currentPage - 1) * 12;
            let url = `${API_BASE}/api/products?skip=${skip}&limit=12`;
            if (currentMinStock) url += `&min_stock=${currentMinStock}`;
            if (currentSearch) url += `&search=${encodeURIComponent(currentSearch)}`;

            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error('Failed to load products');
                const data = await response.json();
                displayProducts(data.data || []);
                displayPagination(data.total, 12);
            } catch (error) {
                console.error('Error:', error);
                container.innerHTML = '<div class="col-span-full text-center text-red-600 py-12">Failed to load products. Please ensure the API is running.</div>';
            }
        }

        function displayProducts(products) {
            const container = document.getElementById('products-container');
            if (!products || products.length === 0) {
                container.innerHTML = '<div class="col-span-full text-center text-gray-600 py-12">No products found.</div>';
                return;
            }

            container.innerHTML = products.map(product => `
                <div class="product-card bg-white rounded-lg shadow-lg overflow-hidden hover:shadow-xl transition">
                    <div class="p-6">
                        <div class="flex justify-between items-start">
                            <h3 class="text-lg font-bold text-gray-800">${escapeHtml(product.name)}</h3>
                            <span class="status-badge status-active">${product.status}</span>
                        </div>
                        <p class="text-sm text-gray-500 mt-1">SKU: ${product.sku}</p>
                        <p class="text-gray-600 mt-2 text-sm">${escapeHtml(product.description || 'No description')}</p>
                        <p class="text-2xl font-bold text-purple-600 mt-3">$${formatPrice(product.price)}</p>
                        <p class="text-sm ${product.stock_quantity < 10 ? 'text-red-600 font-semibold' : 'text-green-600'} mt-1">
                            Stock: ${product.stock_quantity} units
                        </p>
                        <button onclick="checkStock(${product.id})" class="mt-4 w-full bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 transition">
                            Check Stock
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function displayPagination(total, limit) {
            const totalPages = Math.ceil(total / limit);
            const paginationDiv = document.getElementById('pagination');
            if (totalPages <= 1) {
                paginationDiv.innerHTML = '';
                return;
            }

            let buttons = '';
            for (let i = 1; i <= Math.min(totalPages, 5); i++) {
                buttons += `<button onclick="goToPage(${i})" class="px-3 py-1 rounded ${i === currentPage ? 'bg-purple-600 text-white' : 'bg-white text-gray-700 hover:bg-gray-100'} transition">${i}</button>`;
            }
            paginationDiv.innerHTML = buttons;
        }

        function goToPage(page) {
            currentPage = page;
            loadProducts();
        }

        function resetFilters() {
            document.getElementById('min-stock-filter').value = '';
            document.getElementById('search-product').value = '';
            currentMinStock = null;
            currentSearch = null;
            currentPage = 1;
            loadProducts();
        }

        async function checkStock(productId) {
            const quantity = prompt('Enter quantity to check:', '1');
            if (!quantity || isNaN(quantity)) return;

            try {
                const response = await fetch(`${API_BASE}/api/products/${productId}/check-stock`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ quantity: parseInt(quantity) })
                });
                if (!response.ok) throw new Error('Stock check failed');
                const data = await response.json();
                const result = data.data;
                if (result.is_available) {
                    showToast(`✓ ${quantity} units available! Current stock: ${result.available_quantity}`, 'success');
                } else {
                    showToast(`✗ Only ${result.available_quantity} units available. Requested: ${quantity}`, 'error');
                }
            } catch (error) {
                showToast('Error checking stock: ' + error.message, 'error');
            }
        }

        // Orders Functions
        async function loadOrders() {
            const container = document.getElementById('orders-container');
            container.innerHTML = '<div class="flex justify-center py-12"><div class="loading-spinner"></div></div>';

            try {
                const response = await fetch(`${API_BASE}/api/orders?limit=50`);
                if (!response.ok) throw new Error('Failed to load orders');
                const data = await response.json();
                displayOrders(data.data || []);
            } catch (error) {
                console.error('Error:', error);
                container.innerHTML = '<div class="text-center text-red-600 py-12">Failed to load orders.</div>';
            }
        }

        function displayOrders(orders) {
            const container = document.getElementById('orders-container');
            if (!orders || orders.length === 0) {
                container.innerHTML = '<div class="text-center text-gray-600 py-12">No orders found. Create your first order!</div>';
                return;
            }

            container.innerHTML = orders.map(order => `
                <div onclick="viewOrderDetail(${order.id})" class="bg-white rounded-lg shadow-lg p-6 cursor-pointer hover:shadow-xl transition">
                    <div class="flex justify-between items-start">
                        <div>
                            <p class="text-sm text-gray-500">Order #${order.id}</p>
                            <p class="text-xs text-gray-400">${order.order_uuid}</p>
                        </div>
                        <span class="status-badge status-${order.status}">${order.status.toUpperCase()}</span>
                    </div>
                    <p class="text-2xl font-bold text-purple-600 mt-3">$${formatPrice(order.total_amount)}</p>
                    <p class="text-sm text-gray-500 mt-2">Created: ${formatDate(order.created_at)}</p>
                </div>
            `).join('');
        }

        async function viewOrderDetail(orderId) {
            try {
                const response = await fetch(`${API_BASE}/api/orders/${orderId}`);
                if (!response.ok) throw new Error('Failed to load order details');
                const data = await response.json();
                const order = data.data;
                
                const modalContent = document.getElementById('order-detail-content');
                modalContent.innerHTML = `
                    <div class="space-y-4">
                        <div class="flex justify-between">
                            <div>
                                <p class="text-sm text-gray-500">Order ID</p>
                                <p class="font-semibold">${order.id}</p>
                            </div>
                            <div>
                                <p class="text-sm text-gray-500">Status</p>
                                <span class="status-badge status-${order.status}">${order.status.toUpperCase()}</span>
                            </div>
                        </div>
                        <div>
                            <p class="text-sm text-gray-500">Order UUID</p>
                            <p class="font-mono text-sm">${order.order_uuid}</p>
                        </div>
                        <div>
                            <p class="text-sm text-gray-500">User ID</p>
                            <p>${order.user_id}</p>
                        </div>
                        <div>
                            <p class="text-sm text-gray-500">Total Amount</p>
                            <p class="text-2xl font-bold text-purple-600">$${formatPrice(order.total_amount)}</p>
                        </div>
                        <div>
                            <p class="text-sm text-gray-500">Created</p>
                            <p>${formatDate(order.created_at)}</p>
                        </div>
                        <div>
                            <p class="text-sm text-gray-500">Last Updated</p>
                            <p>${formatDate(order.updated_at)}</p>
                        </div>
                        <div class="border-t pt-4">
                            <h4 class="font-semibold text-gray-800 mb-3">Order Items</h4>
                            <div class="space-y-2">
                                ${order.items.map(item => `
                                    <div class="flex justify-between items-center border-b pb-2">
                                        <div>
                                            <p class="font-medium">${escapeHtml(item.product_name)}</p>
                                            <p class="text-sm text-gray-500">SKU: ${item.product_sku}</p>
                                        </div>
                                        <div class="text-right">
                                            <p>${item.quantity} x $${formatPrice(item.unit_price)}</p>
                                            <p class="font-semibold">$${formatPrice(item.subtotal)}</p>
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    </div>
                `;
                document.getElementById('order-detail-modal').classList.remove('hidden');
            } catch (error) {
                showToast('Error loading order details: ' + error.message, 'error');
            }
        }

        // Create Order Functions
        async function loadProductsForModal() {
            try {
                const response = await fetch(`${API_BASE}/api/products?limit=100`);
                if (!response.ok) throw new Error('Failed to load products');
                const data = await response.json();
                productsList = data.data || [];
                populateProductSelect();
            } catch (error) {
                console.error('Error loading products:', error);
            }
        }

        function populateProductSelect() {
            const select = document.getElementById('modal-product-id');
            select.innerHTML = productsList.map(product => 
                `<option value="${product.id}" data-price="${product.price}" data-name="${escapeHtml(product.name)}" data-stock="${product.stock_quantity}">
                    ${escapeHtml(product.name)} - $${formatPrice(product.price)} (Stock: ${product.stock_quantity})
                </option>`
            ).join('');
        }

        function openProductModal() {
            if (productsList.length === 0) {
                loadProductsForModal().then(() => {
                    document.getElementById('product-modal').classList.remove('hidden');
                });
            } else {
                document.getElementById('product-modal').classList.remove('hidden');
            }
        }

        function closeProductModal() {
            document.getElementById('product-modal').classList.add('hidden');
        }

        function addToOrder() {
            const select = document.getElementById('modal-product-id');
            const productId = parseInt(select.value);
            const quantity = parseInt(document.getElementById('modal-quantity').value);
            const selectedOption = select.options[select.selectedIndex];
            const productName = selectedOption.getAttribute('data-name');
            const price = parseFloat(selectedOption.getAttribute('data-price'));
            const currentStock = parseInt(selectedOption.getAttribute('data-stock'));

            if (!quantity || quantity < 1) {
                showToast('Please enter a valid quantity', 'error');
                return;
            }

            if (quantity > currentStock) {
                showToast(`Only ${currentStock} units available in stock`, 'error');
                return;
            }

            const existingItem = orderItems.find(item => item.product_id === productId);
            if (existingItem) {
                existingItem.quantity += quantity;
            } else {
                orderItems.push({ product_id: productId, quantity, product_name: productName, unit_price: price });
            }

            renderOrderItems();
            closeProductModal();
            document.getElementById('modal-quantity').value = '1';
        }

        function renderOrderItems() {
            const container = document.getElementById('order-items-list');
            if (orderItems.length === 0) {
                container.innerHTML = '<p class="text-gray-500 text-center py-4">No items added yet. Click "Add Product" to start.</p>';
                document.getElementById('order-total').textContent = '0.00';
                return;
            }

            let total = 0;
            container.innerHTML = orderItems.map((item, index) => {
                const subtotal = item.quantity * item.unit_price;
                total += subtotal;
                return `
                    <div class="flex justify-between items-center bg-gray-50 p-3 rounded-lg">
                        <div>
                            <p class="font-medium">${escapeHtml(item.product_name)}</p>
                            <p class="text-sm text-gray-500">$${formatPrice(item.unit_price)} × ${item.quantity}</p>
                        </div>
                        <div class="flex items-center gap-3">
                            <p class="font-semibold">$${formatPrice(subtotal)}</p>
                            <button onclick="removeOrderItem(${index})" class="text-red-600 hover:text-red-800 text-xl">&times;</button>
                        </div>
                    </div>
                `;
            }).join('');
            document.getElementById('order-total').textContent = formatPrice(total);
        }

        function removeOrderItem(index) {
            orderItems.splice(index, 1);
            renderOrderItems();
        }

        async function submitOrder() {
            const userId = parseInt(document.getElementById('user-id').value);
            if (orderItems.length === 0) {
                showToast('Please add at least one item to your order', 'error');
                return;
            }

            const orderData = {
                user_id: userId,
                items: orderItems.map(item => ({
                    product_id: item.product_id,
                    quantity: item.quantity
                }))
            };

            try {
                const response = await fetch(`${API_BASE}/api/orders`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(orderData)
                });
                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.detail || 'Failed to create order');
                }
                const data = await response.json();
                showToast(`Order #${data.data.id} created successfully! Total: $${formatPrice(data.data.total_amount)}`, 'success');
                orderItems = [];
                renderOrderItems();
                showTab('orders');
                loadOrders();
            } catch (error) {
                showToast('Error creating order: ' + error.message, 'error');
            }
        }

        // Utility Functions
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function closeOrderDetailModal() {
            document.getElementById('order-detail-modal').classList.add('hidden');
        }

        // Event Listeners
        document.getElementById('min-stock-filter')?.addEventListener('change', (e) => {
            currentMinStock = e.target.value ? parseInt(e.target.value) : null;
            currentPage = 1;
            loadProducts();
        });

        document.getElementById('search-product')?.addEventListener('input', (e) => {
            currentSearch = e.target.value || null;
            currentPage = 1;
            loadProducts();
        });

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            loadProducts();
        });
    </script>
</body>
</html>
